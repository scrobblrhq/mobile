name: scrobblr_mobile
description: Scrobblr Android scrobbler — background media-session listener with a Material You UI.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Material You: wallpaper-derived ColorSchemes on Android 12+.
  dynamic_color: ^1.7.0
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  # Gallery picker for avatar / artist / album image uploads.
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
